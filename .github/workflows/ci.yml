name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  lint:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        php: [8.4]
    steps:
      - uses: actions/checkout@v4
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mbstring, pdo, pdo_sqlite
          tools: composer:v2
      - name: Install dependencies
        run: composer install --no-progress
      - name: Run Pint (PSR-12)
        run: ./vendor/bin/pint --test

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.4
          tools: composer:v2
      - name: Install dependencies
        run: composer install --no-progress
      - name: Audit dependencies
        run: composer audit --format=json > audit-report.json
      - name: Fail on high severity vulnerabilities
        run: |
          php -r "
            \$report = json_decode(file_get_contents('audit-report.json'), true);
            \$high = [];
            if (isset(\$report['advisories'])) {
              foreach (\$report['advisories'] as \$pkg => \$advs) {
                foreach (\$advs as \$adv) {
                  \$severity = \$adv['severity'] ?? 'medium';
                  if (in_array(\$severity, ['high', 'critical'], true)) {
                    \$high[] = sprintf('%s (%s): %s', \$pkg, \$severity, \$adv['title'] ?? 'No title');
                  }
                }
              }
            }
            if (\$high) {
              echo \"High severity vulnerabilities found:\" . PHP_EOL;
              echo implode(PHP_EOL, \$high) . PHP_EOL;
              exit(1);
            }
            echo 'No high severity vulnerabilities found.' . PHP_EOL;
          "

  test:
    needs: [lint]
    runs-on: ubuntu-latest
    environment:
      name: ${{ github.ref_name == 'main' && 'production' || 'development' }}
    strategy:
      matrix:
        php: [8.4]
    steps:
      - uses: actions/checkout@v4
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mbstring, pdo, pdo_sqlite, pdo_mysql
          tools: composer:v2
      - name: Install dependencies
        run: composer install --no-progress
      - name: Prepare environment
        run: |
          cp .env.example .env
          php artisan key:generate
          php artisan jwt:secret --force || true
      - name: Run tests
        run: php artisan test
        env:
          APP_KEY: ${{ secrets.APP_KEY }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}

  build:
    needs: [lint, test, security]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t laravel-app .
      - name: Start container
        run: docker run -d --name app-test -p 8000:8000 laravel-app
      - name: Wait for startup
        run: sleep 5
      - name: Verify container is running
        run: docker ps --filter name=app-test --filter status=running --format '{{.Names}}' | grep -q app-test
      - name: Verify HTTP response
        run: curl -sf -o /dev/null http://localhost:8000
      - name: Cleanup
        if: always()
        run: docker stop app-test && docker rm app-test
